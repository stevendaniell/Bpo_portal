<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - BPO Helpdesk</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link href="/css/style.css" rel="stylesheet">
</head>
<body>
    <div class="auth-container">
        <div class="auth-card">
            <div class="text-center">
                <i class="bi bi-headset" style="font-size: 3rem; color: #4361ee;"></i>
                <h2 class="mt-2">Welcome Back</h2>
                <p class="subtitle">Login to your BPO Helpdesk account</p>
            </div>

            <div id="alertBox"></div>

            <form id="loginForm">
                <div class="mb-3">
                    <label class="form-label fw-semibold">
                        <i class="bi bi-person me-1"></i>Username
                    </label>
                    <input type="text" class="form-control" id="username" placeholder="Enter your username" required>
                </div>
                <div class="mb-4">
                    <label class="form-label fw-semibold">
                        <i class="bi bi-lock me-1"></i>Password
                    </label>
                    <input type="password" class="form-control" id="password" placeholder="Enter your password" required>
                </div>
                <button type="submit" class="btn btn-primary-custom" id="loginBtn">
                    <i class="bi bi-box-arrow-in-right me-2"></i>Login
                </button>
            </form>

            <div class="text-center mt-4">
                <p class="mb-0 text-muted">
                    Don't have an account? <a href="/register.html" class="text-decoration-none fw-semibold">Register here</a>
                </p>
                <a href="/" class="text-muted small text-decoration-none">
                    <i class="bi bi-arrow-left me-1"></i>Back to Home
                </a>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/js/app.js"></script>
    <script>
        // Redirect if already logged in
        if (api.isLoggedIn()) window.location.href = '/dashboard.html';

        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('loginBtn');
            btn.disabled = true;
            btn.innerHTML = '<span class="spinner-border spinner-border-sm me-2"></span>Logging in...';

            try {
                const data = await api.post('/api/auth/login', {
                    username: document.getElementById('username').value,
                    password: document.getElementById('password').value
                });
                api.saveAuth(data);
                showAlert('alertBox', 'Login successful! Redirecting...', 'success');
                setTimeout(() => {
                    const user = api.getUser();
                    if (user.role === 'ADMIN' || user.role === 'AGENT') {
                        window.location.href = '/admin.html';
                    } else {
                        window.location.href = '/dashboard.html';
                    }
                }, 800);
            } catch (err) {
                showAlert('alertBox', err.message || 'Invalid username or password');
                btn.disabled = false;
                btn.innerHTML = '<i class="bi bi-box-arrow-in-right me-2"></i>Login';
            }
        });
    </script>
</body>
</html>
