<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - BPO Helpdesk</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link href="/css/style.css" rel="stylesheet">
</head>
<body>
    <div class="auth-container">
        <div class="auth-card">
            <div class="text-center">
                <i class="bi bi-person-plus" style="font-size: 3rem; color: #4361ee;"></i>
                <h2 class="mt-2">Create Account</h2>
                <p class="subtitle">Join BPO Helpdesk to get support</p>
            </div>

            <div id="alertBox"></div>

            <form id="registerForm">
                <div class="mb-3">
                    <label class="form-label fw-semibold">
                        <i class="bi bi-person me-1"></i>Full Name
                    </label>
                    <input type="text" class="form-control" id="fullName" placeholder="Enter your full name" required>
                </div>
                <div class="mb-3">
                    <label class="form-label fw-semibold">
                        <i class="bi bi-at me-1"></i>Username
                    </label>
                    <input type="text" class="form-control" id="username" placeholder="Choose a username" required minlength="3">
                </div>
                <div class="mb-3">
                    <label class="form-label fw-semibold">
                        <i class="bi bi-envelope me-1"></i>Email
                    </label>
                    <input type="email" class="form-control" id="email" placeholder="Enter your email" required>
                </div>
                <div class="mb-3">
                    <label class="form-label fw-semibold">
                        <i class="bi bi-lock me-1"></i>Password
                    </label>
                    <input type="password" class="form-control" id="password" placeholder="Create a password" required minlength="6">
                </div>
                <div class="mb-4">
                    <label class="form-label fw-semibold">
                        <i class="bi bi-person-badge me-1"></i>Register As
                    </label>
                    <select class="form-select" id="role" style="border-radius: 10px; padding: 12px 16px;">
                        <option value="CUSTOMER">Customer</option>
                        <option value="AGENT">Agent</option>
                        <option value="ADMIN">Admin</option>
                    </select>
                </div>
                <button type="submit" class="btn btn-primary-custom" id="registerBtn">
                    <i class="bi bi-person-plus me-2"></i>Create Account
                </button>
            </form>

            <div class="text-center mt-4">
                <p class="mb-0 text-muted">
                    Already have an account? <a href="/login.html" class="text-decoration-none fw-semibold">Login here</a>
                </p>
                <a href="/" class="text-muted small text-decoration-none">
                    <i class="bi bi-arrow-left me-1"></i>Back to Home
                </a>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/js/app.js"></script>
    <script>
        if (api.isLoggedIn()) window.location.href = '/dashboard.html';

        document.getElementById('registerForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('registerBtn');
            btn.disabled = true;
            btn.innerHTML = '<span class="spinner-border spinner-border-sm me-2"></span>Creating account...';

            try {
                const data = await api.post('/api/auth/register', {
                    fullName: document.getElementById('fullName').value,
                    username: document.getElementById('username').value,
                    email: document.getElementById('email').value,
                    password: document.getElementById('password').value,
                    role: document.getElementById('role').value
                });
                api.saveAuth(data);
                showAlert('alertBox', 'Account created successfully! Redirecting...', 'success');
                setTimeout(() => {
                    const user = api.getUser();
                    if (user.role === 'ADMIN' || user.role === 'AGENT') {
                        window.location.href = '/admin.html';
                    } else {
                        window.location.href = '/dashboard.html';
                    }
                }, 800);
            } catch (err) {
                showAlert('alertBox', err.message || 'Registration failed');
                btn.disabled = false;
                btn.innerHTML = '<i class="bi bi-person-plus me-2"></i>Create Account';
            }
        });
    </script>
</body>
</html>
